services:
  authentik-proxy-outpost:
    # image: ghcr.io/goauthentik/proxy
    image: ${AUTHENTIK_IMAGE:-ghcr.io/goauthentik/proxy}:${AUTHENTIK_TAG:-2026.2.1}
    # Optionally specify the container's network, which must be able to reach the core authentik server.
    networks:
      - nginx-proxy-manager
    ports:
      - 9000:9000
      - 9443:9443
    environment:
      AUTHENTIK_HOST: ${AUTHENTIK_HOST}
      AUTHENTIK_INSECURE: ${AUTHENTIK_INSECURE}
      AUTHENTIK_TOKEN: file:///run/secrets/authentik_token
      # Optional setting to be used when `authentik_host` for internal communication doesn't match the public URL.
      # AUTHENTIK_HOST_BROWSER: https://external-domain.tld
    secrets:
      - authentik_token

networks:
  nginx-proxy-manager:
    external: true

secrets:
  authentik_token:
    file: ${SECRETS}/AUTHENTIK_TOKEN
